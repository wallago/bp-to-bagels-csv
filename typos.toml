# configuration for https://github.com/crate-ci/typos

[default.extend-words]
# Whitelist false positives: format is word = "word"
# Example:
# ratatui = "ratatui"
# kubernetes = "kubernetes"
Salaires = "Salaires"

[files]
# Exclude files or directories from checking
extend-exclude = [
