# configuration for https://github.com/EmbarkStudios/cargo-deny

[licenses]
# license detection confidence (0.0 - 1.0)
confidence-threshold = 0.8
# keep the allow-list forward-looking; don't warn on licenses no dep uses yet
unused-allowed-license = "allow"
# allowed licenses — add or remove based on your requirements
allow = [
  "MIT",
  "Apache-2.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "Zlib",
  "ISC",
]

[bans]
# surface accidental duplicate dependencies…
multiple-versions = "warn"
# …but ignore this known transitive dup: rusqlite pulls hashbrown 0.16
# (via sqlite-wasm-rs) and 0.17 (via hashlink). Not fixable from here.
skip = [
  { crate = "hashbrown" },
]

[sources]
# block dependencies from unknown registries
unknown-registry = "deny"
# warn on dependencies from unknown git sources
unknown-git = "warn"
# only allow crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[advisories]
# ignore specific RustSec advisories (e.g. no fix available yet)
# review periodically and remove once fixed
ignore = [
  # "RUSTSEC-YYYY-NNNN",
]
